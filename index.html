<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>網紅劇本大師 AI | 社群趨勢助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .sidebar-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .collapsed { width: 0; overflow: hidden; opacity: 0; padding: 0; margin: 0; }
        .chat-bubble-ai { background: rgba(30, 41, 59, 0.8); border-top-left-radius: 2px; }
        .chat-bubble-user { background: #4f46e5; border-top-right-radius: 2px; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .typing-dot { animation: typing 1.4s infinite; }
        @keyframes typing { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- 頂部導航列 -->
    <header class="h-16 border-b border-slate-800 flex items-center justify-between px-6 shrink-0 z-20 bg-slate-900">
        <div class="flex items-center gap-4">
            <button id="toggleSidebar" class="p-2 hover:bg-slate-800 rounded-lg transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z"></path></svg>
                </div>
                <h1 class="text-lg font-bold tracking-tight">網紅劇本大師 <span class="text-indigo-400 text-xs font-normal">v2.0</span></h1>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <div class="relative group">
                <input type="password" id="apiKeyInput" placeholder="請輸入 Gemini API Key..." 
                    class="w-64 bg-slate-800 border border-slate-700 rounded-full px-4 py-1.5 text-xs focus:ring-1 focus:ring-indigo-500 outline-none transition-all">
                <div class="absolute -bottom-8 right-0 bg-slate-800 text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
                    密鑰會保存在您的瀏覽器中
                </div>
            </div>
            <button id="refreshTrends" class="p-2 hover:rotate-180 transition-transform duration-500 text-slate-400 hover:text-indigo-400">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </button>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        <!-- 左側熱門話題 (可收納) -->
        <aside id="sidebar" class="w-72 bg-slate-900 border-r border-slate-800 sidebar-transition flex flex-col h-full z-10">
            <div class="p-4 border-b border-slate-800 flex justify-between items-center">
                <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest">熱門話題 Top 10</h2>
                <span class="text-[10px] bg-indigo-500/20 text-indigo-400 px-2 py-0.5 rounded-full">LIVE</span>
            </div>
            <div id="trendList" class="flex-1 overflow-y-auto p-2 space-y-1">
                <!-- 話題列表將動態生成 -->
                <div class="p-8 text-center text-slate-500 text-sm animate-pulse">
                    正在獲取最新趨勢...
                </div>
            </div>
        </aside>

        <!-- 中間劇本與對話視窗 -->
        <main class="flex-1 flex flex-col bg-slate-950 relative">
            <!-- 當前操作話題指示器 -->
            <div id="currentTopicHeader" class="px-6 py-3 bg-slate-900/50 border-b border-slate-800 hidden">
                <div class="flex items-center gap-2">
                    <span class="text-xs text-indigo-400">正在處理主題：</span>
                    <span id="activeTopicLabel" class="text-sm font-bold"></span>
                </div>
            </div>

            <!-- 對話內容區 -->
            <div id="chatContainer" class="flex-1 overflow-y-auto p-6 space-y-6">
                <div class="flex flex-col items-center justify-center h-full text-center space-y-4 opacity-50">
                    <div class="w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                    </div>
                    <div>
                        <p class="text-lg font-medium">從左側選擇一個話題</p>
                        <p class="text-sm">或者直接在下方輸入您的劇本靈感</p>
                    </div>
                </div>
            </div>

            <!-- 輸入區 -->
            <div class="p-6 shrink-0">
                <div class="max-w-4xl mx-auto glass rounded-2xl p-2 flex items-end gap-2 shadow-2xl">
                    <textarea id="userInput" rows="1" placeholder="輸入指令或修改劇本意見..." 
                        class="flex-1 bg-transparent border-none focus:ring-0 text-sm py-3 px-4 resize-none max-h-32"></textarea>
                    <button id="sendBtn" class="bg-indigo-600 hover:bg-indigo-700 p-3 rounded-xl transition-all active:scale-90 disabled:opacity-50">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </button>
                </div>
                <p class="text-center text-[10px] text-slate-600 mt-2">AI 生成內容僅供參考，請自行評估社群規範</p>
            </div>
        </main>
    </div>

    <script>
        // 狀態管理
        let state = {
            apiKey: localStorage.getItem('gemini_api_key') || '',
            activeTopic: '',
            chatHistory: [],
            isSidebarOpen: true
        };

        // 初始化
        window.onload = () => {
            if (state.apiKey) document.getElementById('apiKeyInput').value = state.apiKey;
            fetchTrends();
        };

        // UI 元件
        const sidebar = document.getElementById('sidebar');
        const toggleSidebar = document.getElementById('toggleSidebar');
        const trendList = document.getElementById('trendList');
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const apiKeyInput = document.getElementById('apiKeyInput');

        // 事件監聽
        toggleSidebar.onclick = () => {
            state.isSidebarOpen = !state.isSidebarOpen;
            sidebar.classList.toggle('collapsed', !state.isSidebarOpen);
        };

        apiKeyInput.onchange = (e) => {
            state.apiKey = e.target.value.trim();
            localStorage.setItem('gemini_api_key', state.apiKey);
        };

        userInput.oninput = function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        };

        document.getElementById('refreshTrends').onclick = fetchTrends;

        // API 呼叫：獲取趨勢
        async function fetchTrends() {
            if (!state.apiKey) {
                trendList.innerHTML = `<div class="p-4 text-xs text-orange-400 bg-orange-400/10 rounded-lg">請先輸入 API Key 以獲取最新趨勢</div>`;
                return;
            }

            try {
                const prompt = "請列出目前在 Instagram, Facebook, 和 YouTube 上最熱門的 10 個話題或趨勢，請針對台灣市場。請以 JSON 格式返回，格式為: {\"trends\": [{\"id\": 1, \"title\": \"話題標題\", \"source\": \"平台\", \"summary\": \"短描述\"}]}";
                const response = await callGemini(prompt);
                const data = JSON.parse(response);
                
                trendList.innerHTML = '';
                data.trends.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "p-3 hover:bg-slate-800 rounded-xl cursor-pointer transition-all border border-transparent hover:border-slate-700 group";
                    div.onclick = () => selectTopic(item.title);
                    div.innerHTML = `
                        <div class="flex justify-between items-start mb-1">
                            <span class="text-[10px] font-bold text-indigo-400">${item.source}</span>
                            <span class="text-[10px] text-slate-500">#${item.id}</span>
                        </div>
                        <div class="text-sm font-medium group-hover:text-indigo-300 transition-colors">${item.title}</div>
                        <div class="text-[11px] text-slate-500 mt-1 line-clamp-1">${item.summary}</div>
                    `;
                    trendList.appendChild(div);
                });
            } catch (err) {
                trendList.innerHTML = `<div class="p-4 text-xs text-red-400">無法獲取趨勢，請檢查密鑰是否正確。</div>`;
            }
        }

        // 選擇話題並生成初稿
        async function selectTopic(topic) {
            state.activeTopic = topic;
            state.chatHistory = [];
            document.getElementById('currentTopicHeader').classList.remove('hidden');
            document.getElementById('activeTopicLabel').innerText = topic;
            
            chatContainer.innerHTML = '';
            addChatMessage('ai', `正在為您針對話題「${topic}」規劃劇本大綱，請稍候...`);
            
            const prompt = `請針對目前熱門話題「${topic}」為一位網紅撰寫一份短影音（TikTok/Reels/Shorts）劇本。
            劇本結構包含：
            1. 吸引人的標題
            2. 黃金 3 秒勾子（Hook）
            3. 內容主幹
            4. 呼籲行動（CTA）
            請以活潑、社群風格撰寫。`;
            
            await generateResponse(prompt);
        }

        // 發送按鈕邏輯
        sendBtn.onclick = async () => {
            const text = userInput.value.trim();
            if (!text) return;

            userInput.value = '';
            userInput.style.height = 'auto';
            addChatMessage('user', text);
            await generateResponse(text);
        };

        // 核心：呼叫 Gemini 並處理流式呈現效果
        async function generateResponse(text) {
            if (!state.apiKey) return alert('請輸入 API Key');
            
            // 建立 AI 氣泡佔位
            const aiBubbleId = 'ai-' + Date.now();
            addChatMessage('ai', '', aiBubbleId, true);
            const bubbleContent = document.getElementById(aiBubbleId).querySelector('.content');

            try {
                // 組合上下文
                const context = state.chatHistory.map(msg => `${msg.role === 'user' ? 'User' : 'Assistant'}: ${msg.content}`).join('\n');
                const fullPrompt = `${context}\nUser: ${text}\nAssistant:`;

                const responseText = await callGemini(text, true); // 這裡為了穩定使用非流式模擬
                
                // 緩慢打字效果
                let i = 0;
                bubbleContent.innerHTML = '';
                const interval = setInterval(() => {
                    bubbleContent.innerText += responseText.charAt(i);
                    i++;
                    if (i >= responseText.length) {
                        clearInterval(interval);
                        state.chatHistory.push({ role: 'user', content: text });
                        state.chatHistory.push({ role: 'assistant', content: responseText });
                        chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
                    }
                }, 5);

            } catch (err) {
                bubbleContent.innerHTML = `<span class="text-red-400">發生錯誤：${err.message}</span>`;
            }
        }

        // 底層 Gemini API 呼叫
        async function callGemini(prompt, useHistory = false) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${state.apiKey}`;
            
            let contents = [];
            if (useHistory) {
                contents = state.chatHistory.map(m => ({
                    role: m.role === 'user' ? 'user' : 'model',
                    parts: [{ text: m.content }]
                }));
                contents.push({ role: 'user', parts: [{ text: prompt }] });
            } else {
                contents = [{ parts: [{ text: prompt }] }];
            }

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error.message);
            return data.candidates[0].content.parts[0].text;
        }

        // UI 助手：添加對話氣泡
        function addChatMessage(role, content, id = '', isLoading = false) {
            if (chatContainer.querySelector('.opacity-50')) chatContainer.innerHTML = '';

            const div = document.createElement('div');
            div.id = id;
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-2 duration-300`;
            
            const inner = document.createElement('div');
            inner.className = `max-w-[85%] px-4 py-3 rounded-2xl text-sm shadow-sm ${role === 'user' ? 'chat-bubble-user' : 'chat-bubble-ai border border-slate-800'}`;
            
            if (isLoading) {
                inner.innerHTML = `
                    <div class="flex gap-1 py-1">
                        <div class="w-1.5 h-1.5 bg-slate-500 rounded-full typing-dot"></div>
                        <div class="w-1.5 h-1.5 bg-slate-500 rounded-full typing-dot" style="animation-delay: 0.2s"></div>
                        <div class="w-1.5 h-1.5 bg-slate-500 rounded-full typing-dot" style="animation-delay: 0.4s"></div>
                    </div>
                    <div class="content mt-2"></div>
                `;
            } else {
                inner.innerHTML = `<div class="content whitespace-pre-wrap">${content}</div>`;
            }

            div.appendChild(inner);
            chatContainer.appendChild(div);
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
