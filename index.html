<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendPulse AI | 熱門話題與劇本生成</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .sidebar-item:hover { background: rgba(79, 70, 229, 0.1); border-color: rgba(79, 70, 229, 0.3); }
        .btn-glow { box-shadow: 0 0 20px rgba(79, 70, 229, 0.4); }
        
        /* 側邊欄過渡動畫 */
        #sidebar { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); width: 18rem; }
        #sidebar.collapsed { width: 0; opacity: 0; pointer-events: none; transform: translateX(-20px); }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- 頂部導航 -->
    <header class="h-16 border-b border-white/5 glass flex items-center justify-between px-6 shrink-0 z-50">
        <div class="flex items-center gap-4">
            <!-- 收起按鈕 -->
            <button onclick="toggleSidebar()" class="p-2 hover:bg-white/5 rounded-lg transition-colors text-slate-400 hover:text-white" title="切換側邊欄">
                <i data-lucide="menu" class="w-5 h-5"></i>
            </button>
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
                    <i data-lucide="trending-up" class="w-5 h-5 text-white"></i>
                </div>
                <h1 class="text-lg font-black tracking-tighter italic uppercase">TrendPulse <span class="text-indigo-500">AI</span></h1>
            </div>
        </div>
        <div id="status-badge" class="px-3 py-1 bg-amber-500/10 rounded-full text-[10px] text-amber-500 border border-amber-500/20 font-bold uppercase tracking-widest">
            正在檢查金鑰...
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- 左側熱門話題欄 (可收起) -->
        <aside id="sidebar" class="border-r border-white/5 bg-slate-950 flex flex-col shrink-0 overflow-hidden">
            <div class="p-4 border-b border-white/5 flex justify-between items-center whitespace-nowrap">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                    <i data-lucide="zap" class="w-3 h-3 text-indigo-500"></i> 當前熱門話題
                </h2>
                <button onclick="refreshTrends()" class="p-1 hover:bg-white/5 rounded transition-colors text-slate-500 hover:text-white">
                    <i data-lucide="refresh-cw" class="w-4 h-4" id="refresh-icon"></i>
                </button>
            </div>
            <div id="trends-list" class="flex-1 overflow-y-auto p-4 space-y-2 min-w-[18rem]">
                <!-- 由 JS 動態生成 -->
                <div class="animate-pulse space-y-3">
                    <div class="h-12 bg-slate-900 rounded-xl"></div>
                    <div class="h-12 bg-slate-900 rounded-xl"></div>
                    <div class="h-12 bg-slate-900 rounded-xl"></div>
                </div>
            </div>
            <div class="p-4 bg-indigo-900/10 border-t border-white/5 whitespace-nowrap">
                <p class="text-[10px] text-indigo-400/80 leading-relaxed italic">
                    點擊話題自動帶入 AI 創作。
                </p>
            </div>
        </aside>

        <!-- 主內容區 -->
        <main class="flex-1 flex flex-col bg-slate-950 relative overflow-hidden">
            <div id="main-scroll" class="flex-1 overflow-y-auto p-6 md:p-12 scroll-smooth">
                
                <!-- 歡迎介面 -->
                <div id="welcome-ui" class="max-w-2xl mx-auto py-20 text-center">
                    <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 text-xs font-bold mb-8 animate-bounce">
                        <i data-lucide="sparkles" class="w-4 h-4"></i> 新功能：側邊欄收放與搜尋整合
                    </div>
                    <h2 class="text-5xl font-black mb-6 tracking-tight leading-tight">捕捉趨勢，<br><span class="text-indigo-500">一鍵生成劇本</span></h2>
                    <p class="text-slate-400 leading-relaxed mb-10">從左側選擇一個當下最熱門的話題，或是輸入您的創意想法，讓 AI 為您打造爆紅短影音內容。</p>
                    
                    <!-- 提示快捷鍵或說明 -->
                    <div class="flex justify-center gap-4 mb-10 text-xs text-slate-500">
                        <span class="flex items-center gap-1"><i data-lucide="mouse-pointer-2" class="w-3 h-3"></i> 點擊即選</span>
                        <span class="flex items-center gap-1"><i data-lucide="layout-sidebar" class="w-3 h-3"></i> 頂部按鈕可收放</span>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-left">
                        <div class="p-6 rounded-2xl border border-white/5 bg-white/5 hover:bg-white/10 transition-colors">
                            <h3 class="font-bold text-indigo-400 mb-2 flex items-center gap-2">
                                <i data-lucide="flame" class="w-4 h-4"></i> 即時趨勢
                            </h3>
                            <p class="text-xs text-slate-500 leading-relaxed">自動抓取全球與在地熱門關鍵字，確保內容走在尖端。</p>
                        </div>
                        <div class="p-6 rounded-2xl border border-white/5 bg-white/5 hover:bg-white/10 transition-colors">
                            <h3 class="font-bold text-indigo-400 mb-2 flex items-center gap-2">
                                <i data-lucide="video" class="w-4 h-4"></i> 專業腳本
                            </h3>
                            <p class="text-xs text-slate-500 leading-relaxed">針對 TikTok、Instagram Reels 優化的黃金三段式結構。</p>
                        </div>
                    </div>
                </div>

                <!-- 劇本結果展示 -->
                <div id="output-ui" class="hidden max-w-4xl mx-auto">
                    <div class="glass rounded-[2.5rem] p-8 md:p-12 relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-600 to-purple-600"></div>
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-full bg-indigo-600/20 flex items-center justify-center">
                                    <i data-lucide="file-text" class="w-5 h-5 text-indigo-500"></i>
                                </div>
                                <div>
                                    <h3 class="font-bold text-white">生成的劇本</h3>
                                    <p class="text-[10px] text-slate-500 uppercase tracking-widest">AI Generated Script</p>
                                </div>
                            </div>
                            <div class="flex gap-2 w-full md:w-auto">
                                <button onclick="copyToClipboard()" class="flex-1 md:flex-none flex items-center justify-center gap-2 px-4 py-2 bg-white/5 hover:bg-white/10 rounded-xl transition-all text-xs font-bold">
                                    <i data-lucide="copy" class="w-4 h-4"></i> 複製內容
                                </button>
                                <button onclick="resetUI()" class="flex-1 md:flex-none flex items-center justify-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-xl transition-all text-xs font-bold">
                                    <i data-lucide="plus" class="w-4 h-4"></i> 新劇本
                                </button>
                            </div>
                        </div>
                        <div id="script-content" class="text-lg leading-relaxed text-slate-200 whitespace-pre-wrap selection:bg-indigo-500/30 font-light"></div>
                    </div>
                </div>
            </div>

            <!-- 輸入區域 -->
            <div class="p-6 md:p-10 border-t border-white/5 glass shrink-0">
                <div class="max-w-4xl mx-auto relative group">
                    <textarea id="user-input" rows="1" placeholder="輸入主題，或從左側挑選熱門話題..." 
                        class="w-full bg-slate-900/50 border border-white/10 rounded-3xl py-6 pl-8 pr-20 text-sm focus:outline-none focus:border-indigo-500 transition-all resize-none overflow-hidden"></textarea>
                    
                    <button id="action-btn" onclick="handleGenerate()" class="absolute right-3 top-3 w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center text-white hover:bg-indigo-500 transition-all btn-glow group-active:scale-95">
                        <i data-lucide="sparkles" class="w-6 h-6"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- 全螢幕加載 -->
    <div id="loader" class="hidden fixed inset-0 bg-slate-950/90 backdrop-blur-md z-[100] flex flex-col items-center justify-center">
        <div class="relative w-24 h-24 mb-6">
            <div class="absolute inset-0 border-4 border-indigo-600/20 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
            <div class="absolute inset-0 flex items-center justify-center">
                <i data-lucide="brain-circuit" class="w-8 h-8 text-indigo-500"></i>
            </div>
        </div>
        <h3 class="text-xl font-black text-white mb-2 tracking-widest uppercase">AI 劇本構思中</h3>
        <p class="text-slate-500 text-sm">正在根據趨勢生成爆紅內容結構...</p>
    </div>

    <script>
        // 初始化圖標
        lucide.createIcons();

        // 核心配置
        const CONFIG = {
            API_KEY: "", // 保持為空，環境會自動處理
            MODEL: "gemini-2.5-flash-preview-09-2025"
        };

        // UI 元素
        const UI = {
            sidebar: document.getElementById('sidebar'),
            statusBadge: document.getElementById('status-badge'),
            trendsList: document.getElementById('trends-list'),
            userInput: document.getElementById('user-input'),
            loader: document.getElementById('loader'),
            welcome: document.getElementById('welcome-ui'),
            output: document.getElementById('output-ui'),
            scriptText: document.getElementById('script-content'),
            mainScroll: document.getElementById('main-scroll'),
            refreshIcon: document.getElementById('refresh-icon')
        };

        // 側邊欄切換
        function toggleSidebar() {
            UI.sidebar.classList.toggle('collapsed');
        }

        // 初始化
        window.onload = () => {
            refreshTrends();
            updateStatus();
        };

        function updateStatus() {
            UI.statusBadge.innerText = "系統就緒";
            UI.statusBadge.className = "px-3 py-1 bg-emerald-500/10 rounded-full text-[10px] text-emerald-500 border border-emerald-500/20 font-bold uppercase tracking-widest";
        }

        // 獲取趨勢
        async function refreshTrends() {
            UI.refreshIcon.classList.add('animate-spin');
            
            try {
                // 預設話題
                let topics = [
                    "2025 AI 影音創作新趨勢",
                    "數位遊牧的隱藏成本",
                    "如何製作爆紅 Reels 腳本",
                    "低程式碼工具開發心法",
                    "環保永續生活黑科技",
                    "未來十年的熱門技能"
                ];

                // 如果有金鑰，嘗試從 AI 獲取更有創意的話題
                if (CONFIG.API_KEY) {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${CONFIG.MODEL}:generateContent?key=${CONFIG.API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ 
                                parts: [{ text: "請列出 6 個目前社群媒體（如 TikTok, Reels）最熱門的創作主題標題，繁體中文，每行一個，不要數字，不要解釋。" }] 
                            }]
                        })
                    });
                    const data = await response.json();
                    const aiContent = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (aiContent) {
                        topics = aiContent.split('\n').filter(t => t.trim()).slice(0, 6);
                    }
                }

                renderTrends(topics);
            } catch (err) {
                console.warn("更新話題失敗，使用預設內容", err);
                renderTrends(["AI 創作", "短影音行銷", "自動化工作流", "虛擬偶像發展"]);
            } finally {
                UI.refreshIcon.classList.remove('animate-spin');
            }
        }

        function renderTrends(topics) {
            UI.trendsList.innerHTML = topics.map(topic => `
                <div onclick="selectTopic('${topic.replace(/'/g, "\\'")}')" class="sidebar-item group p-4 border border-white/5 rounded-2xl cursor-pointer transition-all bg-white/[0.02]">
                    <div class="flex items-start justify-between">
                        <span class="text-sm font-semibold text-slate-300 group-hover:text-indigo-400 transition-colors line-clamp-2">${topic}</span>
                        <i data-lucide="chevron-right" class="w-4 h-4 text-slate-600 group-hover:translate-x-1 transition-all shrink-0 ml-2"></i>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function selectTopic(topic) {
            UI.userInput.value = topic;
            UI.userInput.dispatchEvent(new Event('input'));
            handleGenerate();
        }

        async function handleGenerate() {
            const prompt = UI.userInput.value.trim();
            if (!prompt) return;

            UI.loader.classList.remove('hidden');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${CONFIG.MODEL}:generateContent?key=${CONFIG.API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ 
                            parts: [{ text: `你是一位短影音爆紅教練。請針對「${prompt}」撰寫一個 60 秒劇本。
                            格式：
                            - 【黃金 3 秒開場】：如何瞬間勾住觀眾？
                            - 【正文 3 大要點】：簡短精幹。
                            - 【反轉或金句】：留下印象。
                            - 【視覺與分鏡建議】：括號標註。
                            - 【強烈 CTA】：行動呼籲。
                            語言：繁體中文，口語化，充滿動力。` }] 
                        }]
                    })
                });

                const data = await response.json();
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text;

                if (text) {
                    UI.welcome.classList.add('hidden');
                    UI.output.classList.remove('hidden');
                    UI.scriptText.innerText = text;
                    UI.mainScroll.scrollTop = 0;
                }
            } catch (err) {
                console.error(err);
                alert("生成出錯，請檢查網路或金鑰。");
            } finally {
                UI.loader.classList.add('hidden');
            }
        }

        function resetUI() {
            UI.output.classList.add('hidden');
            UI.welcome.classList.remove('hidden');
            UI.userInput.value = "";
            UI.userInput.style.height = "auto";
        }

        function copyToClipboard() {
            const text = UI.scriptText.innerText;
            const textarea = document.createElement("textarea");
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            
            // 簡單的反饋
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = `<i data-lucide="check" class="w-4 h-4"></i> 已複製`;
            lucide.createIcons();
            setTimeout(() => {
                btn.innerHTML = originalText;
                lucide.createIcons();
            }, 2000);
        }

        // 輸入框自動高度
        UI.userInput.addEventListener("input", function() {
            this.style.height = "auto";
            this.style.height = (this.scrollHeight) + "px";
        });
    </script>
</body>
</html>
