<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendPulse AI | 實時趨勢洞察</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="min-h-screen flex flex-col md:flex-row">

    <!-- 側邊欄 -->
    <aside class="w-full md:w-80 bg-slate-900 border-r border-slate-800 p-6 flex flex-col">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-10 h-10 bg-indigo-500 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
            </div>
            <h1 class="text-2xl font-bold tracking-tight">TrendPulse<span class="text-indigo-400">AI</span></h1>
        </div>

        <div class="flex-1 space-y-6">
            <div>
                <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 block">API 設定</label>
                <div class="relative">
                    <input type="password" id="apiKey" placeholder="輸入 Gemini API Key..." 
                        class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-slate-200">
                </div>
                <p class="text-[10px] text-slate-500 mt-2">金鑰將儲存在您的瀏覽器中。</p>
            </div>

            <nav class="space-y-1">
                <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 block">分析維度</label>
                <button class="w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-indigo-500/10 text-indigo-400 font-medium border border-indigo-500/20">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                    總體趨勢
                </button>
            </nav>
        </div>

        <div class="pt-6 border-t border-slate-800">
            <div class="flex items-center gap-3 text-sm text-slate-400">
                <div class="w-2 h-2 rounded-full bg-green-500 pulse"></div>
                系統狀態: 正常運作
            </div>
        </div>
    </aside>

    <!-- 主要內容 -->
    <main class="flex-1 p-4 md:p-10 overflow-y-auto">
        <div class="max-w-6xl mx-auto space-y-8">
            
            <!-- 頂部搜尋區域 -->
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
                <div>
                    <h2 class="text-3xl font-bold">搜尋趨勢 <span class="gradient-text">Insights</span></h2>
                    <p class="text-slate-400 mt-1">分析全球市場動向與 AI 預測模型。</p>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="topicInput" placeholder="例如：電動車市場、永續能源..." 
                        class="bg-slate-800 border border-slate-700 rounded-xl px-6 py-3 w-64 md:w-80 focus:outline-none focus:border-indigo-500 transition-all">
                    <button id="analyzeBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl font-semibold shadow-lg shadow-indigo-600/20 transition-all active:scale-95 flex items-center gap-2">
                        <span>開始分析</span>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </button>
                </div>
            </div>

            <!-- 數據卡片 -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="glass-card p-6 rounded-3xl">
                    <p class="text-slate-400 text-sm mb-1">熱度指數</p>
                    <div class="flex items-end justify-between">
                        <h3 id="heatScore" class="text-4xl font-bold">--</h3>
                        <span class="text-green-400 text-sm font-medium mb-1">+12% vs 上月</span>
                    </div>
                </div>
                <div class="glass-card p-6 rounded-3xl">
                    <p class="text-slate-400 text-sm mb-1">情緒得分 (Sentiment)</p>
                    <div class="flex items-end justify-between">
                        <h3 id="sentimentScore" class="text-4xl font-bold">--</h3>
                        <span class="text-indigo-400 text-sm font-medium mb-1">正向成長</span>
                    </div>
                </div>
                <div class="glass-card p-6 rounded-3xl">
                    <p class="text-slate-400 text-sm mb-1">AI 預測可靠度</p>
                    <div class="flex items-end justify-between">
                        <h3 id="reliabilityScore" class="text-4xl font-bold">--</h3>
                        <div class="flex gap-1 mb-2">
                            <div class="w-1.5 h-4 bg-indigo-500 rounded-full"></div>
                            <div class="w-1.5 h-4 bg-indigo-500 rounded-full"></div>
                            <div class="w-1.5 h-4 bg-slate-700 rounded-full"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 圖表與分析內容 -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="glass-card p-8 rounded-3xl min-h-[400px]">
                    <h4 class="text-xl font-bold mb-6 flex items-center gap-2">
                        <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path></svg>
                        趨勢波動圖
                    </h4>
                    <canvas id="trendChart"></canvas>
                </div>

                <div class="glass-card p-8 rounded-3xl flex flex-col">
                    <h4 class="text-xl font-bold mb-6 flex items-center gap-2">
                        <svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707.707M12 13a3 3 0 100-6 3 3 0 000 6z"></path></svg>
                        AI 洞察分析報告
                    </h4>
                    <div id="aiAnalysis" class="flex-1 text-slate-300 leading-relaxed text-sm space-y-4">
                        <p class="text-slate-500 italic">請輸入主題並點擊分析以生成報告...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const apiKeyInput = document.getElementById('apiKey');
        const topicInput = document.getElementById('topicInput');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const aiAnalysis = document.getElementById('aiAnalysis');
        
        // 載入儲存的 Key
        const savedKey = localStorage.getItem('trendpulse_key');
        if (savedKey) apiKeyInput.value = savedKey;

        // 初始化圖表
        let trendChart;
        function initChart(data = [30, 45, 32, 60, 85, 91]) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            if (trendChart) trendChart.destroy();
            
            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['1月', '2月', '3月', '4月', '5月', '6月'],
                    datasets: [{
                        label: '趨勢熱度',
                        data: data,
                        borderColor: '#818cf8',
                        backgroundColor: 'rgba(129, 140, 248, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointBackgroundColor: '#818cf8'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } },
                        x: { grid: { display: false }, ticks: { color: '#64748b' } }
                    }
                }
            });
        }

        async function performAnalysis() {
            const key = apiKeyInput.value.trim();
            const topic = topicInput.value.trim();

            if (!key) {
                alert('請在左側欄位輸入 Gemini API Key');
                return;
            }
            if (!topic) return;

            localStorage.setItem('trendpulse_key', key);
            
            // UI 狀態更新
            analyzeBtn.disabled = true;
            analyzeBtn.innerHTML = `<span class="pulse">分析中...</span>`;
            aiAnalysis.innerHTML = `<div class="space-y-4">
                <div class="h-4 bg-slate-700 rounded w-3/4 animate-pulse"></div>
                <div class="h-4 bg-slate-700 rounded w-full animate-pulse"></div>
                <div class="h-4 bg-slate-700 rounded w-5/6 animate-pulse"></div>
            </div>`;

            const systemPrompt = `你是一個趨勢分析專家。請針對使用者提供的主題進行深度市場分析。
            請以 JSON 格式回應：
            {
                "heat_score": 數字(0-100),
                "sentiment_score": 數字(0-100),
                "reliability": 數字(0-100),
                "chart_data": [6個月份的熱度數字],
                "analysis_text": "大約 200 字的深度分析報告，包含優點、缺點與未來預測。"
            }`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `分析主題：${topic}` }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                if (!response.ok) throw new Error('API 請求失敗');
                
                const data = await response.json();
                const result = JSON.parse(data.candidates[0].content.parts[0].text);

                // 更新數據
                document.getElementById('heatScore').textContent = result.heat_score;
                document.getElementById('sentimentScore').textContent = result.sentiment_score + '%';
                document.getElementById('reliabilityScore').textContent = result.reliability + '%';
                
                aiAnalysis.innerHTML = `<p class="leading-relaxed text-slate-300">${result.analysis_text}</p>
                    <div class="mt-4 p-4 rounded-xl bg-indigo-500/10 border border-indigo-500/20">
                        <p class="text-xs text-indigo-400 font-bold uppercase mb-1">關鍵行動建議</p>
                        <p class="text-sm">根據 AI 模型預測，建議在接下來的季度內加大對於 ${topic} 的相關研發與曝光。</p>
                    </div>`;

                initChart(result.chart_data);

            } catch (err) {
                aiAnalysis.innerHTML = `<p class="text-red-400">分析出錯：${err.message}。請檢查 Key 是否正確。</p>`;
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.innerHTML = `<span>開始分析</span><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>`;
            }
        }

        analyzeBtn.addEventListener('click', performAnalysis);
        topicInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') performAnalysis(); });
        
        // 初始載入
        window.onload = () => initChart();
    </script>
</body>
</html>
